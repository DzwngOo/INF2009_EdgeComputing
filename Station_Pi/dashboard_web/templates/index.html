<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Computing Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="dashboard-container">
        
        <div class="card screen-card">
            <h2 class="screen-text">SCREEN</h2>
        </div>

        <div class="card">
            <div class="seat-title">Seat Availability</div>
            <div class="seat-grid">
                
                <div class="seat-row">
                    <div class="seat-group">
                        <div class="seat G"></div>
                        <div class="seat G"></div>
                    </div>

                    <div class="seat-group">
                        <div class="seat G"></div>
                        <div class="seat G"></div>

                        <!-- controlled seat 1 -->
                        <div id="seat1" class="seat 
                            {% if data.seat1_final == 'TAKEN' %}
                                R
                            {% elif data.seat1_final == 'EMPTY' %}
                                G
                            {% elif data.seat1_final == 'OBJECT' %}
                                O
                            {% else %}
                                X
                            {% endif %}
                        "></div>

                        <!-- controlled seat 2 -->
                        <div id="seat2" class="seat 
                            {% if data.seat2_final == 'TAKEN' %}
                                R
                            {% elif data.seat2_final == 'EMPTY' %}
                                G
                            {% elif data.seat2_final == 'OBJECT' %}
                                O
                            {% else %}
                                X
                            {% endif %}
                        "></div>

                        <div class="seat G"></div>
                    </div>

                    <div class="seat-group">
                        <div class="seat G"></div>
                        <div class="seat G"></div>
                    </div>
                </div>

                <div class="seat-row">
                    <div class="seat-group">
                        <div class="seat G"></div>
                        <div class="seat G"></div>
                    </div>
                    <div class="seat-group">
                        <div class="seat G"></div>
                        <div class="seat G"></div>
                        <div class="seat G"></div>
                        <div class="seat G"></div>
                        <div class="seat G"></div>
                    </div>
                    <div class="seat-group">
                        <div class="seat G"></div>
                        <div class="seat G"></div>
                    </div>
                </div>

            </div>
        </div>

        <div class="card">
            <div class="density-title">Density</div>
            <div id="density-main" class="density-main">UNKNOWN</div>
            
            <div class="density-legend">
                <div id="legend-sparse" class="legend-item">SPARSE</div>
                <div id="legend-dense" class="legend-item">DENSE</div>
                <div id="legend-congested" class="legend-item">CONGESTED</div>
            </div>
        </div>

        <div class="card">
            <div class="density-title">System Health</div>
            <div id="camera-status">Camera: UNKNOWN</div>
            <div id="cabin-link-status">Cabin Link: UNKNOWN</div>
            <div id="ultrasonic-health">Ultrasonic: UNKNOWN / UNKNOWN</div>
        </div>

    </div>

    <script>
        function getDensityLabel(occupancyRatio) {
            if (occupancyRatio === null || occupancyRatio === undefined || occupancyRatio < 0) {
                return "UNKNOWN";
            }

            if (occupancyRatio < 0.4) {
                return "SPARSE";
            } else if (occupancyRatio < 0.7) {
                return "DENSE";
            } else {
                return "CONGESTED";
            }
        }

        function updateDensityUI(occupancyRatio) {
            const densityMain = document.getElementById("density-main");
            const sparse = document.getElementById("legend-sparse");
            const dense = document.getElementById("legend-dense");
            const congested = document.getElementById("legend-congested");

            sparse.classList.remove("active-sparse");
            dense.classList.remove("active-dense");
            congested.classList.remove("active-congested");

            const label = getDensityLabel(occupancyRatio);
            densityMain.textContent = label;

            if (label === "SPARSE") {
                sparse.classList.add("active-sparse");
            } else if (label === "DENSE") {
                dense.classList.add("active-dense");
            } else if (label === "CONGESTED") {
                congested.classList.add("active-congested");
            }
        }

        function updateSingleSeatUI(seatId, seatFinal) {
            const seat = document.getElementById(seatId);
            seat.classList.remove("G", "R", "O", "X");

            if (seatFinal === "TAKEN") {
                seat.classList.add("R");
            } else if (seatFinal === "EMPTY") {
                seat.classList.add("G");
            } else if (seatFinal === "OBJECT") {
                seat.classList.add("O");
            } else {
                seat.classList.add("X");
            }
        }

        function updateSeatUI(seat1Final, seat2Final) {
            updateSingleSeatUI("seat1", seat1Final);
            updateSingleSeatUI("seat2", seat2Final);
        }

        function updateHealthUI(data) {
            document.getElementById("camera-status").textContent = `Camera: ${data.camera_status ?? "UNKNOWN"}`;
            document.getElementById("cabin-link-status").textContent = `Cabin Link: ${data.cabin_link_status ?? "UNKNOWN"}`;
            document.getElementById("ultrasonic-health").textContent =
                `Ultrasonic: ${data.ultrasonic_health1 ?? "UNKNOWN"} / ${data.ultrasonic_health2 ?? "UNKNOWN"}`;
        }

        async function refreshDashboard() {
            try {
                const response = await fetch("/api/data");
                const data = await response.json();

                updateDensityUI(data.occupancy_ratio);
                updateSeatUI(data.seat1_final, data.seat2_final);
                updateHealthUI(data);
            } catch (err) {
                console.error("Failed to refresh dashboard:", err);
            }
        }

        // Initial render from Flask-provided data
        updateDensityUI({{ data.occupancy_ratio if data.occupancy_ratio is not none else -1 }});
        updateSeatUI(
            "{{ data.seat1_final if data.seat1_final is not none else 'UNKNOWN' }}",
            "{{ data.seat2_final if data.seat2_final is not none else 'UNKNOWN' }}"
        );
        updateHealthUI({
            camera_status: "{{ data.camera_status if data.camera_status is not none else 'UNKNOWN' }}",
            cabin_link_status: "{{ data.cabin_link_status if data.cabin_link_status is not none else 'UNKNOWN' }}",
            ultrasonic_health1: "{{ data.ultrasonic_health1 if data.ultrasonic_health1 is not none else 'UNKNOWN' }}",
            ultrasonic_health2: "{{ data.ultrasonic_health2 if data.ultrasonic_health2 is not none else 'UNKNOWN' }}",
        });

        // Poll every 2 seconds
        setInterval(refreshDashboard, 2000);
    </script>

</body>
</html>
